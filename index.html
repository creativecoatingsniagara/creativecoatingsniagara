<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Creative Coatings Niagara</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Creative Coatings Niagara</h1>
  <nav>
    <a href="#services">Services</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Professional Painting & Coatings</h2>
  <p>Serving St. Catharines & Niagara Region</p>
</section>

<section id="services">
  <h2>Our Services</h2>
  <div class="grid">
    <div>Interior Painting</div>
    <div>Exterior Painting</div>
    <div>Epoxy Floors</div>
    <div>Concrete Coatings</div>
  </div>
</section>

<section id="gallery">
  <h2>Recent Work</h2>
  <div class="gallery">
    <img src="https://via.placeholder.com/300">
    <img src="https://via.placeholder.com/300">
    <img src="https://via.placeholder.com/300">
  </div>
</section>

<section id="contact">
  <h2>Get a Quote</h2>
  <form>
    <input type="text" placeholder="Name" required>
    <input type="email" placeholder="Email" required>
    <textarea placeholder="Project details"></textarea>
    <button>Submit</button>
  </form>
</section>

<footer>
  <p>© 2026 Creative Coatings Niagara</p>
</footer>

</body>
</html>
